- type: entity
  name: shower
  id: Shower
  description: shower-description
  placement:
    mode: SnapgridCenter
    snap:
    - Wallmount
  components:
    - type: Sprite
      sprite: _EE/Structures/Furniture/shower.rsi
      drawdepth: WallMountedItems
      layers:
      - state: shower
      - state: shower_on
        map: [ "enum.ToggleableVisuals.Layer" ] # Euphoria - Change showers to use item toggle
    - type: Appearance
    - type: Rotatable
    - type: Transform
      noRot: false
    - type: Clickable
    # - type: Shower; Euphoria - Change showers to use item toggle
    - type: ItemToggle
      soundActivate:
        path: /Audio/_EE/Ambience/Objects/shower_enable.ogg
      soundDeactivate:
        path: /Audio/_EE/Ambience/Objects/shower_enable.ogg
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/_EE/Ambience/Objects/shower_running.ogg
    - type: UseDelay
      delay: 1.0
    - type: ItemToggleRandomToggle
      chance: 0.1 # 10% chance to start toggled on
    - type: Physics
      bodyType: Static
      canCollide: false
    - type: InteractionOutline
    - type: Damageable
      damageContainer: Inorganic
      damageModifierSet: Metallic
    - type: Construction
      graph: Shower
      node: shower
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - type: GenericVisualizer
      visuals:
        enum.ToggleableVisuals.Enabled:
          enum.ToggleableVisuals.Layer:
            True: { visible: true }
            False: { visible: false }
