# TODO move all of this to tiles once tile smoothing is supported
# Simple Carpets
- type: entity
  id: CarpetSimpleBlack
  parent: CarpetBase
  name: black carpet simple
  suffix: Tile
  components:
  - type: Clickable
  - type: Sprite
    sprite: _Floof/Structures/Furniture/Carpets/carpet_simple_black.rsi
  - type: Icon
    sprite: _Floof/Structures/Furniture/Carpets/carpet_simple_black.rsi
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors: #excess damage (nuke?). avoid computational cost of spawning entities.
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 10
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:SpawnEntitiesBehavior
            spawn:
              FloorCarpetSimpleItemBlack:
                min: 1
                max: 1

